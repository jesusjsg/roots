services:
  db:
    image: postgres:18-alpine
    container_name: roots_db
    restart: unless-stopped
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  app-db-data:
